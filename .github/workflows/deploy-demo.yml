name: Deploy demo

# Deploys the DEMO environment ONLY — never production. Production has no CI
# deploy (it is deployed manually via `npm run deploy`), so nothing here can
# touch prod: the app job runs `wrangler deploy --env demo`, which selects the
# `env.demo` block in wrangler.jsonc and the `usedcarsnz-demo` worker.
#
# Triggers on push to the long-lived `demo` branch, plus manual dispatch. The
# founder points `demo` at whatever commit should be live in the demo (usually
# develop). See docs/infra/demo-standup.md.
on:
  push:
    branches: [demo]
  workflow_dispatch:

# Never run two demo deploys at once.
concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (OpenNext → Cloudflare)
        # NEXT_PUBLIC_* are inlined at build time, so the DEMO Supabase project and
        # demo site URL must be present HERE (not just as worker vars). Values come
        # from repo secrets/vars — set them to the DEMO project (see runbook).
        env:
          NEXT_PUBLIC_APP_ENV: demo
          NEXT_PUBLIC_SITE_URL: https://demo.usedcarsnz.co.nz
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.DEMO_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.DEMO_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.DEMO_NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
        run: npx opennextjs-cloudflare build

      - name: Deploy demo worker
        # Server-side secrets (SUPABASE_SECRET_KEY, TURNSTILE_SECRET_KEY,
        # ANTHROPIC_API_KEY, INBOUND_HMAC_SECRET) are NOT set here — the founder
        # sets them once with `wrangler secret put <NAME> --env demo` and they
        # persist across deploys. This step only uploads code + the env.demo vars.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env demo

  deploy-keepalive:
    # Independent of the app build — deploys the standalone daily keep-alive
    # Worker (workers/keepalive). Its SUPABASE_SECRET_KEY is a wrangler secret the
    # founder sets once; this step preserves it across deploys.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy keep-alive worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config workers/keepalive/wrangler.jsonc

  deploy-outbox-sweep:
    # Standalone Cron Worker (workers/outbox-sweep): drains the ack retry queue
    # every 15 min by POSTing the app's /api/cron/outbox-sweep. This is the DEMO
    # deploy, so TARGET_URL is overridden to the demo host here (--var at deploy
    # time); the wrangler.jsonc prod default applies only to a manual deploy
    # outside CI. Do NOT set vars in the dashboard — deploys clobber them
    # (--keep-vars defaults to false). The founder sets CRON_SECRET and the
    # CF_ACCESS_* pair (demo is behind Access) once with `wrangler secret put`;
    # secrets persist across deploys.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy outbox-sweep worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config workers/outbox-sweep/wrangler.jsonc --var TARGET_URL:https://demo.usedcarsnz.co.nz/api/cron/outbox-sweep

  deploy-raw-email-purge:
    # Standalone Cron Worker (workers/raw-email-purge): daily purge of inbound raw
    # MIME older than 30 days (Privacy Act) by POSTing /api/cron/purge-raw-email.
    # Same secret model and TARGET_URL override as deploy-outbox-sweep above —
    # this purge is the mechanism behind the /privacy page's 30-day retention
    # claim, so it must target the environment that actually holds raw emails.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy raw-email-purge worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config workers/raw-email-purge/wrangler.jsonc --var TARGET_URL:https://demo.usedcarsnz.co.nz/api/cron/purge-raw-email
